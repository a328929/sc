app:
  host: 0.0.0.0
  port: 8080
  auth_token: "change-this-token"

telegram:
  api_id: 123456
  api_hash: "your_api_hash"
  target_channel: "@your_private_channel"
  session_file: "my_session.session"

upload:
  concurrency: 2
  retry_max: 5
  retry_backoff_seconds: 2
  progress_tick_ms: 300
  uploads_dir: "./data/uploads"

database:
  path: "./data/uploader.db"

logging:
  path: "./data/uploader.log"
  level: "INFO"
